    const safeParseFloat = (val) => {
      const num = parseFloat(val);

    };

    const Toast = ({ message, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(onClose, 3000);
        return () => clearTimeout(timer);
      }, [onClose]);
      return React.createElement('div', { className: 'toast' }, message);
    };

    const DailyWastageTracker = () => {
      const plateTypeOptions = ['NS 40 (+)', 'NS 40 (-)', 'N 50 (+)', 'N 50 (-)', 'N 100 (+)', 'N 100 (-)'];
      const [activeTab, setActiveTab] = useState('entry');
      const toLocalDateStr = (date) => {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      };
      const [selectedDate, setSelectedDate] = useState(toLocalDateStr(new Date()));
      const [currentMonth, setCurrentMonth] = useState(new Date());
      const [showAnalytics, setShowAnalytics] = useState(false);
      const [toast, setToast] = useState(null);
      const [allData, setAllData] = useState({});
      const chartRef = useRef(null);
      const chartInstance = useRef(null);
      
      const [data, setData] = useState({
        pbInput: { 'GC-01': '', 'GC-02': '', 'GC-03': '', 'GC-04': '', 'Burning': '' },
        dross: { 'GC-01': '', 'GC-02': '', 'GC-03': '', 'GC-04': '', 'Burning': '' },
        cuttingArea: { plateTypes: [''], GD: [''], PD: [''], CD: [''], BD: [''], Bud: [''] },
        cuttingWeight: '',
        burningArea: { plateTypes: [''], GD: [''], PD: [''], CD: [''], BD: [''], Bud: [''] },
        burningWeight: '',
        cuttingBrushingDust: '',
        pastingDust: '',
        pastingRemaining: '',
        pastingPlateDamage: '',
        oxideMillDross: ''
      });

      const [calcDisplay, setCalcDisplay] = useState('0');
      const [calcOperand1, setCalcOperand1] = useState(null);
      const [calcOperator, setCalcOperator] = useState(null);
      const [calcWaitingForOperand, setCalcWaitingForOperand] = useState(false);

      // ── Auth state ───────────────────────────────────────────────
      const [user, setUser] = useState(null);
      const [authReady, setAuthReady] = useState(false);
      const [loginEmail, setLoginEmail] = useState('');
      const [loginPassword, setLoginPassword] = useState('');
      const [loginError, setLoginError] = useState('');
      const [loginLoading, setLoginLoading] = useState(false);
      const [dbLoading, setDbLoading] = useState(false);

      const emptyData = () => ({
        pbInput: { 'GC-01': '', 'GC-02': '', 'GC-03': '', 'GC-04': '', 'Burning': '' },
        dross: { 'GC-01': '', 'GC-02': '', 'GC-03': '', 'GC-04': '', 'Burning': '' },
        cuttingArea: { plateTypes: [''], GD: [''], PD: [''], CD: [''], BD: [''], Bud: [''] },
        cuttingWeight: '',
        burningArea: { plateTypes: [''], GD: [''], PD: [''], CD: [''], BD: [''], Bud: [''] },
        burningWeight: '',
        cuttingBrushingDust: '',
        pastingDust: '',
        pastingRemaining: '',
        pastingPlateDamage: '',
        oxideMillDross: ''
      });

      // Listen to Supabase auth state
      useEffect(() => {
        const sb = window.__sb;
        if (!sb) { setAuthReady(true); return; }
        sb.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user ?? null);
          setAuthReady(true);
        });
        const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
          setUser(session?.user ?? null);
        });
        return () => subscription.unsubscribe();
      }, []);

      // Load ALL data from Supabase when user logs in
      useEffect(() => {
        if (!user) { setAllData({}); return; }
        const sb = window.__sb;
        if (!sb) return;
        setDbLoading(true);
        sb.from('wastage').select('*')
          .then(({ data, error }) => {
            if (error) { showToast('⚠️ Failed to load data'); return; }
            const loaded = {};
            (data || []).forEach(row => {
              loaded[row.date] = row.payload;
            });
            setAllData(loaded);
          })
          .finally(() => setDbLoading(false));
      }, [user]);

      // Load data for selected date
      useEffect(() => {
        const saved = allData[selectedDate];
        if (saved) {
          setData({ ...emptyData(), ...saved,
            cuttingArea: saved.cuttingArea || emptyData().cuttingArea,
            burningArea: saved.burningArea || emptyData().burningArea
          });
        } else {
          setData(emptyData());
        }
      }, [selectedDate, allData]);

      const handleLogin = async () => {
        const sb = window.__sb;
        if (!sb) { setLoginError('Supabase not configured yet.'); return; }
        setLoginLoading(true); setLoginError('');
        const { error } = await sb.auth.signInWithPassword({ email: loginEmail, password: loginPassword });
        if (error) setLoginError('❌ Wrong email or password.');
        setLoginLoading(false);
      };

      const handleLogout = async () => {
        const sb = window.__sb;
        if (sb) await sb.auth.signOut();
        setAllData({});
      };

      const saveData = async () => {
        const sb = window.__sb;
        if (!sb || !user) { showToast('❌ Not logged in'); return; }
        const { error } = await sb.from('wastage').upsert({ date: selectedDate, payload: data }, { onConflict: 'date' });
        if (error) { showToast('❌ Save failed: ' + error.message); return; }
        setAllData(prev => ({ ...prev, [selectedDate]: data }));
        showToast('✅ Saved to cloud!');
      };

      const clearData = async () => {
        if (!confirm('⚠️ Clear all data for this date? This cannot be undone.')) return;
        const sb = window.__sb;
        if (!sb || !user) { showToast('❌ Not logged in'); return; }
        const { error } = await sb.from('wastage').delete().eq('date', selectedDate);
        if (error) { showToast('❌ Clear failed: ' + error.message); return; }
        setAllData(prev => { const n = { ...prev }; delete n[selectedDate]; return n; });
        setData(emptyData());
        showToast('🗑️ Data cleared from cloud');
      };

      // Generate calendar days
      const getDaysInMonth = (date) => {
        const year = date.getFullYear();
        const month = date.getMonth();
        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 0);
        const days = [];
        
        // Add previous month days
        const firstDayOfWeek = firstDay.getDay();
        const prevMonthLastDay = new Date(year, month, 0).getDate();
        for (let i = firstDayOfWeek - 1; i >= 0; i--) {
          days.push({
            date: new Date(year, month - 1, prevMonthLastDay - i),
            isCurrentMonth: false
          });
        }
        
        // Add current month days
        for (let i = 1; i <= lastDay.getDate(); i++) {
          days.push({
            date: new Date(year, month, i),
            isCurrentMonth: true
          });
        }
        
        // Add next month days
        const remainingDays = 42 - days.length;
        for (let i = 1; i <= remainingDays; i++) {
          days.push({
            date: new Date(year, month + 1, i),
            isCurrentMonth: false
          });
        }
        
        return days;
      };

      const changeMonth = (delta) => {

          setCalcWaitingForOperand(false);
          return;
        }
        if (value === '=') {
          if (calcOperand1 !== null && calcOperator !== null) {
            const operand2 = parseFloat(calcDisplay);
            let result = 0;
            switch (calcOperator) {
              case '+': result = calcOperand1 + operand2; break;
              case '-': result = calcOperand1 - operand2; break;
              case '*': result = calcOperand1 * operand2; break;
              case '/': result = calcOperand1 / operand2; break;
              default: return;
            }
            setCalcDisplay(String(result));
            setCalcOperand1(null);
            setCalcOperator(null);
            setCalcWaitingForOperand(true);
          }
          return;
        }
        if (['+', '-', '*', '/'].includes(value)) {
          if (calcOperand1 === null) {
            setCalcOperand1(parseFloat(calcDisplay));
          } else if (calcOperator) {
            const operand2 = parseFloat(calcDisplay);
            let result = 0;
            switch (calcOperator) {
              case '+': result = calcOperand1 + operand2; break;
              case '-': result = calcOperand1 - operand2; break;
              case '*': result = calcOperand1 * operand2; break;

            setCalcDisplay(String(result));

          }
          setCalcOperator(value);
          setCalcWaitingForOperand(true);
          return;
        }
        if (calcWaitingForOperand) {

                React.createElement('td', { style: { fontWeight: '600' } }, 'Dross (%)'),
                ...pbKeys.map(k => {
                  const pct = sumPb[k] === 0 ? '0.00' : ((sumDross[k] / sumPb[k]) * 100).toFixed(2);
                  return React.createElement('td', { key: k }, ro(pct));
                }),
                React.createElement('td', { style: totalCellStyle }, (() => {
                  const tp = pbKeys.reduce((s,k) => s + sumPb[k], 0);
                  const td2 = pbKeys.reduce((s,k) => s + sumDross[k], 0);
                  return ro(tp === 0 ? '0.00' : ((td2/tp)*100).toFixed(2));
                })())
              )
            )
          )
        );

        // ── Area table builder (reused for cutting & burning) ────────
        const buildAreaTable = (plateMap, weightSum, weightLabel, unit) => {
          const plates = Object.keys(plateMap);
          const fields = ['GD','PD','CD','BD','Bud'];
          const colTotals = {};
          fields.forEach(f => { colTotals[f] = plates.reduce((s, pt) => s + plateMap[pt][f], 0); });
          const colTotalSum = fields.reduce((s,f) => s + colTotals[f], 0);

          const rows = plates.map(pt => {
            const row = plateMap[pt];
            const rowTotal = fields.reduce((s,f) => s + row[f], 0);
            return React.createElement('tr', { key: pt },
              React.createElement('td', { style: { fontWeight: '600' } }, pt),
              ...fields.map(f => React.createElement('td', { key: f }, ro(row[f].toFixed(2)))),
              React.createElement('td', { style: totalCellStyle }, ro(rowTotal.toFixed(2)))
            );
          });

          // Column totals row
          rows.push(
            React.createElement('tr', { key: '__total__', style: totRowStyle },
              React.createElement('td', { style: { fontWeight: '700' } }, '📊 Total'),
              ...fields.map(f => React.createElement('td', { key: f }, ro(colTotals[f].toFixed(2)))),
              React.createElement('td', { style: totalCellStyle }, ro(colTotalSum.toFixed(2)))
            )
          );

          return React.createElement('div', { className: 'table-container' },
            React.createElement('table', null,
              React.createElement('thead', null,
                React.createElement('tr', null,
                  React.createElement('th', null, 'Plate Type'),
                  React.createElement('th', null, `GD (${unit})`),
                  React.createElement('th', null, `PD (${unit})`),
                  React.createElement('th', null, `CD (${unit})`),
                  React.createElement('th', null, `BD (${unit})`),
                  React.createElement('th', null, `Bud (${unit})`),
                  React.createElement('th', { style: totalCellStyle }, `Total (${unit})`)
                )
              ),
              React.createElement('tbody', null, ...rows)
            ),
            React.createElement('div', { style: { marginTop: '12px', maxWidth: '240px' } },
              React.createElement('label', null, weightLabel),
              ro(weightSum.toFixed(2) + ' kg')
            )
          );
        };

        // ── Main render ──────────────────────────────────────────────
        return React.createElement('div', null,
          // Date range header card
          React.createElement('div', { className: 'stats-grid', style: { marginBottom: '20px' } },
            React.createElement('div', { className: 'stat-card', style: { background: 'linear-gradient(135deg, #0891b2 0%, #0e7490 100%)' } },
              React.createElement('h3', null, 'Total Days with Data'),
              React.createElement('div', { className: 'value' }, dates.length)
            ),
            React.createElement('div', { className: 'stat-card', style: { background: 'linear-gradient(135deg, #16a34a 0%, #15803d 100%)' } },
              React.createElement('h3', null, 'Date Range'),
              React.createElement('div', { className: 'value', style: { fontSize: dates.length ? '16px' : '28px' } },
                dates.length ? `${dates[0]}  →  ${dates[dates.length - 1]}` : '—'
              )
            ),
            React.createElement('div', { className: 'stat-card', style: { background: 'linear-gradient(135deg, #dc2626 0%, #b91c1c 100%)' } },
              React.createElement('h3', null, 'Total Wastage (kg)'),
              React.createElement('div', { className: 'value' }, (() => {
                const totalDross = pbKeys.reduce((s,k) => s + sumDross[k], 0);
                const totalExtra = Object.values(sumExtra).reduce((s,v) => s+v, 0);
                return (totalDross + sumCuttingWeight + sumBurningWeight + totalExtra).toFixed(2);
              })())
            )
          ),

          noData
            ? React.createElement('div', { style: { textAlign: 'center', padding: '40px', color: '#94a3b8', fontSize: '18px' } },
                '📭 No saved data yet. Enter data in the Data Entry tab first.')
            : React.createElement('div', null,

                // PB Table
                React.createElement('div', { className: 'section' },
                  React.createElement('h2', null, '🔋 Pb Input & Dross — Cumulative'),
                  pbTableEl
                ),

                // Cutting Area
                React.createElement('div', { className: 'section' },
                  React.createElement('h2', null, '✂️ Cutting/Brushing Area — Cumulative'),
                  cuttingPlates.length === 0
                    ? React.createElement('p', { style: { color: '#94a3b8' } }, 'No cutting data saved.')
                    : buildAreaTable(cuttingByPlate, sumCuttingWeight, 'Total Plate Weight (kg)', 'Pcs')
                ),

                // Burning Area
                React.createElement('div', { className: 'section' },
                  React.createElement('h2', null, '🔥 Burning Area — Cumulative'),
                  burningPlates.length === 0
                    ? React.createElement('p', { style: { color: '#94a3b8' } }, 'No burning data saved.')
                    : buildAreaTable(burningByPlate, sumBurningWeight, 'Total Weight (kg)', 'kg')
                ),

                // Additional fields
                React.createElement('div', { className: 'section' },
                  React.createElement('h2', null, '🧹 Additional Wastage — Cumulative'),
                  React.createElement('div', { className: 'grid' },
                    ...additionalFields.map(f =>
                      React.createElement('div', { key: f.key },
                        React.createElement('label', null, f.label),
                        ro(sumExtra[f.key].toFixed(2) + ' kg')
                      )
                    )
                  )
                )
              )
        );
      };
      // ── End Summary Report ───────────────────────────────────────────

      // ── Login Screen ─────────────────────────────────────────────
      if (!authReady) return React.createElement('div', { style: { display:'flex', alignItems:'center', justifyContent:'center', height:'100vh', fontSize:'20px', color:'#64748b' } }, '⏳ Loading...');

      if (!user) return React.createElement('div', { style: { display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh' } },
        React.createElement('div', { style: { background:'white', borderRadius:'16px', boxShadow:'0 8px 32px rgba(0,0,0,0.12)', padding:'40px', width:'100%', maxWidth:'400px' } },
          React.createElement('div', { style: { textAlign:'center', marginBottom:'24px' } },
            React.createElement('div', { style: { fontSize:'48px' } }, '🏭'),
            React.createElement('h1', { style: { fontSize:'22px', color:'#0f172a', marginTop:'8px', marginBottom:'4px' } }, 'Daily Wastage Tracker'),
            React.createElement('p', { style: { color:'#64748b', fontSize:'14px' } }, 'Sign in to access your data')
          ),
          React.createElement('div', { style: { marginBottom:'16px' } },
            React.createElement('label', { style: { display:'block', fontWeight:'600', marginBottom:'6px', fontSize:'14px' } }, 'Email'),
            React.createElement('input', { type:'email', value:loginEmail, onChange:e=>setLoginEmail(e.target.value), placeholder:'you@example.com', style:{ width:'100%', padding:'12px', border:'1px solid #cbd5e1', borderRadius:'8px', fontSize:'15px' },
              onKeyDown: e => e.key === 'Enter' && handleLogin() })
          ),
          React.createElement('div', { style: { marginBottom:'20px' } },
            React.createElement('label', { style: { display:'block', fontWeight:'600', marginBottom:'6px', fontSize:'14px' } }, 'Password'),
            React.createElement('input', { type:'password', value:loginPassword, onChange:e=>setLoginPassword(e.target.value), placeholder:'••••••••', style:{ width:'100%', padding:'12px', border:'1px solid #cbd5e1', borderRadius:'8px', fontSize:'15px' },
              onKeyDown: e => e.key === 'Enter' && handleLogin() })
          ),
          loginError && React.createElement('div', { style: { background:'#fef2f2', border:'1px solid #fca5a5', borderRadius:'8px', padding:'10px 14px', marginBottom:'16px', color:'#dc2626', fontSize:'14px' } }, loginError),
          React.createElement('button', {
            onClick: handleLogin,
            disabled: loginLoading,
            style: { width:'100%', padding:'13px', background: loginLoading ? '#94a3b8' : 'linear-gradient(135deg,#667eea,#764ba2)', color:'white', border:'none', borderRadius:'8px', fontSize:'16px', fontWeight:'600', cursor: loginLoading ? 'not-allowed' : 'pointer' }
          }, loginLoading ? '⏳ Signing in...' : '🔐 Sign In')
        )
      );
      // ── End Login Screen ─────────────────────────────────────────

      return React.createElement('div', { className: 'container' },
        dbLoading && React.createElement('div', { style:{ position:'fixed', inset:0, background:'rgba(255,255,255,0.8)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:9999, fontSize:'20px', color:'#64748b' } }, '☁️ Loading from cloud...'),
        React.createElement('div', { className: 'card', id: 'pdf-content' },
          React.createElement('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:'10px', marginBottom:'16px' } },
            React.createElement('h1', { style:{ margin:0 } }, '🏭 Daily Wastage Tracker System'),
            React.createElement('div', { style:{ display:'flex', alignItems:'center', gap:'10px', flexShrink:0 } },
              React.createElement('span', { style:{ fontSize:'13px', color:'#64748b', fontWeight:'500' } }, '👤 ' + (user.email || '')),
              React.createElement('button', { onClick: handleLogout, style:{ background:'#ef4444', color:'white', border:'none', borderRadius:'8px', padding:'8px 14px', cursor:'pointer', fontWeight:'600', fontSize:'13px' } }, '🚪 Logout')
            )
          ),
          
          React.createElement('div', { className: 'tabs' },
            React.createElement('button', {
              className: `tab ${activeTab === 'entry' ? 'active' : ''}`,
              onClick: () => setActiveTab('entry')
            }, '📝 Data Entry'),
            React.createElement('button', {
              className: `tab ${activeTab === 'summary' ? 'active' : ''}`,
              onClick: () => setActiveTab('summary')
            }, '📊 Summary Report'),
            React.createElement('button', {
              className: `tab ${activeTab === 'calendar' ? 'active' : ''}`,
              onClick: () => setActiveTab('calendar')
            }, '📅 Calendar View')
          ),
          
          React.createElement('div', { className: `tab-content ${activeTab === 'entry' ? 'active' : ''}` },
            React.createElement('div', { className: 'stats-grid' },
              React.createElement('div', { className: 'stat-card', style: { background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)' } },
                React.createElement('h3', null, 'Select Date'),
                React.createElement('input', {
                  type: 'date',
                  value: selectedDate,
                  onChange: (e) => {
                    if (e.target.value) setSelectedDate(e.target.value);
                  },
                  style: {
                    background: 'rgba(255,255,255,0.2)',
                    border: '1px solid rgba(255,255,255,0.5)',
                    borderRadius: '8px',
                    color: 'white',
                    fontSize: '18px',
                    fontWeight: 'bold',
                    padding: '6px 10px',
                    width: '100%',
                    textAlign: 'center',
                    cursor: 'pointer',
                    colorScheme: 'dark'
                  }
                })
              )
            ),
            
            React.createElement('div', { className: 'header-actions' },
              React.createElement('button', {
                className: 'btn',
                style: { background: '#f59e0b', color: 'white' },
                onClick: toggleCalculator
              }, '🧮 Calculator'),
              React.createElement('button', { className: 'btn btn-save', onClick: saveData }, React.createElement(SaveIcon), ' Save'),
              React.createElement('button', { className: 'btn btn-pdf', onClick: exportToPDF }, React.createElement(FileTextIcon), ' PDF'),
              React.createElement('button', { className: 'btn btn-analytics', onClick: showAnalyticsModal }, React.createElement(BarChartIcon), ' Trends'),
              React.createElement('button', { className: 'btn btn-clear', onClick: clearData }, React.createElement(TrashIcon), ' Clear')
            ),
            
            React.createElement('div', { id: 'calculator-panel' },
              React.createElement('div', { className: 'calc-display' }, calcDisplay),
              React.createElement('div', { className: 'calc-buttons' },
                ['7','8','9','/'].map(b => React.createElement('button', {
                  key: b,
                  className: 'calc-btn',
                  onClick: () => handleCalcButtonPress(b)
                }, b)),
                ['4','5','6','*'].map(b => React.createElement('button', {
                  key: b,
                  className: 'calc-btn',
                  onClick: () => handleCalcButtonPress(b)
                }, b)),
                ['1','2','3','-'].map(b => React.createElement('button', {
                  key: b,
                  className: 'calc-btn',
                  onClick: () => handleCalcButtonPress(b)
                }, b)),
                ['0','.','=','+'].map(b => React.createElement('button', {
                  key: b,
                  className: b === '=' ? 'calc-btn equals' : 'calc-btn',
                  onClick: () => handleCalcButtonPress(b)
                }, b)),
                React.createElement('button', {
                  className: 'calc-btn clear',
                  onClick: () => handleCalcButtonPress('C')
                }, 'C')
              )
            ),
            
            renderPbTable(),
            renderCuttingBrushingAreaTable(),
            renderBurningAreaTable(),
            
            React.createElement('div', { className: 'grid' },
              ...additionalFields.map(f =>
                React.createElement('div', { key: f.key },
                  React.createElement('label', null, f.label),
                  React.createElement('input', {
                    type: 'number',
                    min: '0',
                    step: '0.01',
                    value: data[f.key],
                    onChange: (e) => {
                      if (e.target.value === '' || /^-?\d*\.?\d*$/.test(e.target.value)) {
                        setData(prev => ({ ...prev, [f.key]: e.target.value }));
                      }
                    }
                  })
                )
              )
            )
          ),
          
          React.createElement('div', { className: `tab-content ${activeTab === 'summary' ? 'active' : ''}` },
            renderSummaryReport()
          ),
          
          React.createElement('div', { className: `tab-content ${activeTab === 'calendar' ? 'active' : ''}` },
            renderCalendarView()
          )
        ),
        React.createElement(AnalyticsModal),
        toast && React.createElement(Toast, { message: toast, onClose: () => setToast(null) })
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(DailyWastageTracker));
  </script>
</body>
